<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLearn AI - Student Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

    <div class="auth-container animate-fade-in">
        
        <div class="left-panel center-align">
            <img src="{{ url_for('static', filename='brain_logo.png') }}" alt="NeuroLearn Logo" class="auth-logo">
            <h2>Student Login account</h2>
            <p>Welcome back! Hey, enter your details to login to your account.</p>
        </div>

        <div class="right-panel">
            <form method="POST" action="/login">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="passwordField" name="password" placeholder="Password" required>
                    <span class="password-toggle" onclick="togglePasswordVisibility()" style="cursor: pointer; user-select: none;">👁️</span>
                </div>

                <button class="action-btn neon-orange log-in-btn" type="submit">Log in</button>
            </form>
            
            <p class="auth-switch">Don't have an account? <a href="/signup">Signup</a></p>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById("passwordField");
            const toggleIcon = document.querySelector(".password-toggle");
            
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.textContent = "🙈"; // Visual indicator update for active plain text
            } else {
                passwordInput.type = "password";
                toggleIcon.textContent = "👁️";
            }
        }
    </script>
</body>
</html>
